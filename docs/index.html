<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title> HabitIQ | Sign up  </title>

        <link rel="stylesheet" href="styles.css" />
        <script>
            document.addEventListener('DOMContentLoaded', function() {
              if (localStorage.getItem('darkMode') === 'true')
                document.body.classList.add('dark-mode');
              if (localStorage.getItem('highContrast') === 'true')
                document.body.classList.add('high-contrast');
              if (localStorage.getItem('dyslexiaFont') === 'true')
                document.body.classList.add('dyslexia-font');
            });
          </script>
    </head>
    <body>
        <main class="auth-container">
    <h1>HabitIQ</h1>
    <p class="subtitle">Smart habit tracking for students</p>

    <form id="signup-form">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Name" required />

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@student.ac.uk" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" required />

      <ul class="password-rules">
    <li id="rule-length">At least 8 char.</li>
    <li id="rule-upper">One uppercase letter</li>
    <li id="rule-number">At least one number</li>
  </ul>

      <button type="submit">Create Account</button>
    </form>

      <div class="auth-divider">
      <span>or</span>
    </div>
    <button id="google-signin" class="google-btn" type="button">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" />
      Continue with Google
    </button>

    <p class="switch-auth">
      Already have an account?
      <a href="login.html">Log in</a>
    </p>
  </main>
  <script type="module">
     import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      createUserWithEmailAndPassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import {
    getFirestore,
    doc,
    setDoc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyDUPdCJIpj09iUSHL4Dm_ZwbYuHzzq_SmM",
  authDomain: "habitiq-364b5.firebaseapp.com",
  projectId: "habitiq-364b5",
  storageBucket: "habitiq-364b5.firebasestorage.app",
  messagingSenderId: "825959188014",
  appId: "1:825959188014:web:ec3fc6ed82a076be4f01bf"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById("signup-form");
    

    const passwordInput = document.getElementById("password");
    const submitBtn = form.querySelector("button[type='submit']"); 
    passwordInput.addEventListener("input", () => {
      const val = passwordInput.value;
      document.getElementById("rule-length").classList.toggle("passed", val.length >= 8);
      document.getElementById("rule-upper").classList.toggle("passed", /[A-Z]/.test(val));
      document.getElementById("rule-number").classList.toggle("passed", /[0-9]/.test(val));
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
    alert("Password must be at least 8 characters, include one uppercase letter and one number.");
    return;
  }

      submitBtn.disabled = true;
      submitBtn.textContent ="Creating account....";


      try {
        const userCredential = await createUserWithEmailAndPassword(
          auth,
          email,
          password
        );
        await updateProfile(userCredential.user,{
          displayName: name
        });

        await setDoc(doc(db, "users",  userCredential.user.uid), {
          name: name,
          email:email,
          onboardingComplete: false,
          globalStreak:0,
          lastActiveDate:null,
          createdAt: new Date()
        });

        window.location.href = "onboarding.html";
        //console.log(userCredential.user);
      } catch (error) {
        submitBtn.disabled = false;
        submitBtn.textContent ="Create Account";

        const errorMessages = {
      "auth/email-already-in-use": "An account with this email already exists. Try logging in instead.",
      "auth/invalid-email": "Please enter a valid email address.",
      "auth/weak-password": "Password is too weak. Please follow the requirements above.",
      "auth/network-request-failed": "Network error. Please check your connection and try again."
    };

    const message = errorMessages[error.code] || "Something went wrong. Please try again.";
    alert(message);
    console.error(error);
      }
    });

    const googleBtn = document.getElementById("google-signin");
const provider = new GoogleAuthProvider();

googleBtn.addEventListener("click", async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    const userDoc = await getDoc(doc(db, "users", user.uid));

    if (!userDoc.exists()) {
      await setDoc(doc(db, "users", user.uid), {
        name: user.displayName || "User",
        email: user.email,
        onboardingComplete: false,
        globalStreak: 0,
        lastActiveDate: null,
        createdAt: new Date()
      });
      window.location.href = "onboarding.html";
    } else if (!userDoc.data().onboardingComplete) {
      window.location.href = "onboarding.html";
    } else {
      window.location.href = "dashboard.html";
    }

  } catch (error) {
    const errorMessages = {
      "auth/popup-closed-by-user": "Sign in was cancelled.",
      "auth/network-request-failed": "Network error. Please check your connection.",
      "auth/popup-blocked": "Popup was blocked. Please allow popups for this site."
    };
    const message = errorMessages[error.code] || "Google sign in failed. Please try again.";
    alert(message);
    console.error(error);
  }
});

  </script>
</body>
</html>
