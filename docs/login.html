<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitIQ | Login page</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
        document.addEventListener('DOMContentLoaded', function() {
          if (localStorage.getItem('darkMode') === 'true')
            document.body.classList.add('dark-mode');
          if (localStorage.getItem('highContrast') === 'true')
            document.body.classList.add('high-contrast');
          if (localStorage.getItem('dyslexiaFont') === 'true')
            document.body.classList.add('dyslexia-font');
        });
</script>
</head>

<body>
  <main class="auth-container">
    <h1>HabitIQ</h1>
    <p class="subtitle">Welcome back</p>

    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@student.ac.uk" required />

      <label for="password">Password</label>
      <div class="password-field">
        <input type="password" id="password" placeholder="Password" required />
        <button type="button" class="toggle-password">Show</button>
      </div>

      <button type="submit">Log In</button>
    </form>

    <div class="auth-divider">
      <span>or</span>
    </div>
    <button id="google-signin" class="google-btn" type="button">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" />
      Continue with Google
    </button>

    <p class="forgot-password">
      <a href="forgot-password.html">Forgot your password</a>
    </p>

    <p class="switch-auth">
      Don't have an account?
      <a href="index.html">Sign up</a>
    </p>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDUPdCJIpj09iUSHL4Dm_ZwbYuHzzq_SmM",
      authDomain: "habitiq-364b5.firebaseapp.com",
      projectId: "habitiq-364b5",
      storageBucket: "habitiq-364b5.firebasestorage.app",
      messagingSenderId: "825959188014",
      appId: "1:825959188014:web:ec3fc6ed82a076be4f01bf"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Email/password login
    const form = document.getElementById("login-form");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const userDoc = await getDoc(doc(db, "users", user.uid));

        if (!userDoc.exists() || !userDoc.data().onboardingComplete) {
          window.location.href = "onboarding.html";
        } else {
          window.location.href = "dashboard.html";
        }
      } catch (error) {
        const errorMessages = {
          "auth/invalid-credential": "Incorrect email or password. Please try again.",
          "auth/user-not-found": "No account found with this email.",
          "auth/wrong-password": "Incorrect password. Please try again.",
          "auth/network-request-failed": "Network error. Please check your connection."
        };
        const message = errorMessages[error.code] || "Something went wrong. Please try again.";
        alert(message);
        console.error(error);
      }
    });

    // Google login
    const googleBtn = document.getElementById("google-signin");
    const provider = new GoogleAuthProvider();

    googleBtn.addEventListener("click", async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        const userDoc = await getDoc(doc(db, "users", user.uid));

        if (!userDoc.exists()) {
          await setDoc(doc(db, "users", user.uid), {
            name: user.displayName || "User",
            email: user.email,
            onboardingComplete: false,
            globalStreak: 0,
            lastActiveDate: null,
            createdAt: new Date()
          });
          window.location.href = "onboarding.html";
        } else if (!userDoc.data().onboardingComplete) {
          window.location.href = "onboarding.html";
        } else {
          window.location.href = "dashboard.html";
        }

      } catch (error) {
        const errorMessages = {
          "auth/popup-closed-by-user": "Sign in was cancelled.",
          "auth/network-request-failed": "Network error. Please check your connection.",
          "auth/popup-blocked": "Popup was blocked. Please allow popups for this site."
        };
        const message = errorMessages[error.code] || "Google sign in failed. Please try again.";
        alert(message);
        console.error(error);
      }
    });
    document.querySelectorAll(".toggle-password").forEach(button => {
  button.addEventListener("click", () => {
    const input = button.previousElementSibling;

    if (input.type === "password") {
      input.type = "text";
      button.textContent = "Hide";
    } else {
      input.type = "password";
      button.textContent = "Show";
    }
  });
});
  </script>
</body>
</html>
