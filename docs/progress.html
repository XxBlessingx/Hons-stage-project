<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>HabitIQ | Progress</title>
        <link rel="stylesheet" href="styles.css"/>
        <script>
          document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('darkMode') === 'true')
              document.body.classList.add('dark-mode');
            if (localStorage.getItem('highContrast') === 'true')
              document.body.classList.add('high-contrast');
            if (localStorage.getItem('dyslexiaFont') === 'true')
              document.body.classList.add('dyslexia-font');
            });
        </script>
    </head>

    <body>

<header class="top-nav">
  <a href="dashboard.html" class="logo">🔥 HabitIQ</a>
 <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="all-habits.html">All Habits</a>
        <a href="profile.html">Profile</a>
        <a href="progress.html"class="active">View Progress</a>
        <a href="settings.html">Settings</a>
    </nav>
  <button id="logout" class="logout-btn">Log out</button>
</header>

<main class="progress-main">

  <!-- weekly overview  -->
  <section class="progress-card level-card">
    <h2>📊 Weekly Overview</h2>
    <div class="level-stats">
      <p><strong>Completion Rate:</strong> <span id="weekly-rate">0%</span></p>
      <p><strong>Risk Level:</strong> <span id="risk-level">Low</span></p>
      <p><strong>Strongest Habit:</strong> <span id="highest-habit">—</span></p>
      <p><strong>Needs Attention:</strong> <span id="lowest-habit">—</span></p>
    </div>
  </section>

  <!-- momentum trends  -->
  <section class="progress-card trend-card">
    <h2>📈 Momentum Trend</h2>
    <div class="trend-content">
      <div id="trend-direction" class="trend-indicator">Stable</div>
      <p>This week vs last week</p>
      <p id="trend-difference"></p>
    </div>
  </section>

  <!-- milestones  -->
  <section class="progress-card badge-card">
    <h2>🏆 Milestones</h2>
    <div id="milestone-container" class="badge-container">
      <!-- badges dynamically inserted -->
    </div>
  </section>

  <!--  habit performance -->
  <section class="progress-card habit-performance-card">
    <h2>🎯 Habit Performance</h2>
    <div id="habit-performance-container">
    </div>
  </section>

</main>

<script type="module" src="progress.js"></script>

</body>

</html>
